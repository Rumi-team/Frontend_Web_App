name: Supabase Keepalive (REST)

on:
  schedule:
    # Twice a week at 08:00 UTC on Mon/Thu. Adjust to taste.
    - cron: "0 8 * * 1,4"
  # Manual trigger button in the Actions tab
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Query a tiny row via PostgREST
        run: |
          set -euo pipefail

          # Build the URL to read a single row (fast and cheap)
          URL="${{ secrets.SUPABASE_URL }}/rest/v1/${{ secrets.SUPABASE_TABLE }}?select=id&limit=1"

          # Perform the GET with anon key headers
          code=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            "$URL")

          echo "HTTP $code"

          # Make the job fail if not 2xx/3xx (helps you notice issues)
          test "$code" -ge 200 -a "$code" -lt 400