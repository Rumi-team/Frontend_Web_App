name: Supabase Keepalive (REST)

on:
  schedule:
    - cron: "0 8 * * 1,4"   # Mon & Thu @ 08:00 UTC
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_TABLE: ${{ secrets.SUPABASE_TABLE }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      SUPABASE_SELECT: ${{ secrets.SUPABASE_SELECT }} # optional
    steps:
      - name: Query a tiny row via PostgREST
        run: |
          set -euo pipefail
          SELECT_COL="${SUPABASE_SELECT:-*}"
          URL="${SUPABASE_URL}/rest/v1/${SUPABASE_TABLE}?select=${SELECT_COL}&limit=1"

          resp=$(curl -s -w "\n%{http_code}" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
            "$URL")

          echo "Raw response:"
          echo "$resp"

          code=$(echo "$resp" | tail -n1)
          test "$code" -ge 200 -a "$code" -lt 400